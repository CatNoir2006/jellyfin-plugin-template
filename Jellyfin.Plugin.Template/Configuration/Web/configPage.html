<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Template</title>
</head>
<body>
    <div id="TemplateConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-controller="__plugin/Template.js" data-require="emby-input,emby-button,emby-select,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <div class="verticalSection">
                    <h2 class="sectionTitle">Live TV Setup</h2>
                    <div class="flex">
                        <button is="emby-button" type="button" id="btnAddTuner" class="raised button-submit emby-button">
                            <span>Add Tuner</span>
                        </button>
                        <button is="emby-button" type="button" id="btnAddGuide" class="raised button-submit emby-button" style="margin-left: 1em;">
                            <span>Add Guide</span>
                        </button>
                        <button is="emby-button" type="button" id="btnPing" class="raised button-submit emby-button" style="margin-left: 1em;">
                            <span>Ping</span>
                        </button>
                    </div>
                </div>
                <form id="TemplateConfigForm">
                    <div class="selectContainer">
                        <label class="selectLabel" for="Options">Active WebUI</label>
                        <select is="emby-select" id="Options" name="Options" class="emby-select-withcolor emby-select">
                            <option id="optShowBoth" value="ShowBoth">Show Both</option>
                            <option id="optShowPlainHtml" value="ShowPlainHtml">Show Plain HTML</option>
                            <option id="optShowVueJS" value="ShowVueJS">Show Vue.JS</option>
                        </select>
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="AnInteger">An Integer</label>
                        <input id="AnInteger" name="AnInteger" type="number" is="emby-input" min="0" />
                        <div class="fieldDescription">A Description</div>
                    </div>
                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label class="emby-checkbox-label">
                            <input id="TrueFalseSetting" name="TrueFalseCheckBox" type="checkbox" is="emby-checkbox" />
                            <span>A Checkbox</span>
                        </label>
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="AString">A String</label>
                        <input id="AString" name="AString" type="text" is="emby-input" />
                        <div class="fieldDescription">Another Description</div>
                    </div>
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
